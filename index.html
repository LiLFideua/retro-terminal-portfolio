<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retro Terminal Portfolio</title>
  <style>
    :root { color-scheme: dark; --green:#47ff7a; --muted:#74a985; --bg:#020403; --panel:#06110a; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at 55% 15%, #0c2b18 0, #020403 42%, #000 100%); color:var(--green); font:16px/1.55 "Cascadia Mono", Consolas, monospace; overflow:hidden; }
    body:before { content:""; position:fixed; inset:0; pointer-events:none; background:linear-gradient(rgba(255,255,255,.035) 50%, rgba(0,0,0,.1) 50%); background-size:100% 4px; mix-blend-mode:screen; }
    main { width:min(1040px, calc(100vw - 32px)); height:min(720px, calc(100vh - 32px)); margin:16px auto; border:1px solid #1b6d35; background:rgba(2,12,6,.92); box-shadow:0 0 55px #116b2a66, inset 0 0 90px #0d301a; border-radius:8px; display:grid; grid-template-rows:auto 1fr auto; overflow:hidden; }
    header { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid #164d29; color:#baffc8; }
    .dot { width:12px; height:12px; border-radius:50%; background:#ff5f57; box-shadow:20px 0 #ffbd2e, 40px 0 #28c840; margin-right:46px; }
    #screen { padding:18px; overflow:auto; }
    .line { white-space:pre-wrap; margin:0 0 8px; text-shadow:0 0 8px #3cff64aa; }
    .muted { color:var(--muted); }
    .command { color:#caffd3; }
    form { display:flex; align-items:center; gap:8px; padding:14px 18px; border-top:1px solid #164d29; background:#020805; }
    label { color:#caffd3; }
    input { flex:1; min-width:0; border:0; outline:0; background:transparent; color:var(--green); font:inherit; caret-color:#fff; }
    a { color:#caffd3; }
    @media (max-width:640px) { body { font-size:14px; } main { height:100vh; width:100vw; margin:0; border-radius:0; } }
  
/* Professional polish layer */
:root {
  --radius: 6px;
  --shadow: 0 18px 50px rgba(0, 0, 0, .28);
  --shadow-soft: 0 10px 28px rgba(0, 0, 0, .18);
  --border-subtle: rgba(255, 255, 255, .16);
  --focus-ring: rgba(125, 211, 252, .55);
}
body {
  font-family: "Aptos", "Segoe UI", system-ui, -apple-system, sans-serif;
  text-rendering: optimizeLegibility;
}
main {
  max-width: min(1220px, calc(100vw - 28px));
}
h1, h2, h3, strong {
  letter-spacing: 0;
}
p, small, label, .muted {
  color: var(--muted, #a8b1b8);
}
.panel, .timer, .hero, .channel, .stage, aside, .card {
  border-color: var(--border-subtle) !important;
  box-shadow: var(--shadow-soft);
}
button, input, select, textarea, .card, .swatch, .cell {
  border-radius: var(--radius) !important;
}
button, a.card, .swatch, .cell {
  transition: transform .16s ease, border-color .16s ease, background .16s ease, box-shadow .16s ease;
}
button:hover, a.card:hover, .swatch:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-soft);
}
input:focus-visible, textarea:focus-visible, select:focus-visible, button:focus-visible, a:focus-visible {
  outline: 3px solid var(--focus-ring);
  outline-offset: 2px;
}
::selection {
  background: var(--accent, #7dd3fc);
  color: #071018;
}
@media (max-width: 720px) {
  main {
    width: min(100% - 20px, 1220px);
    padding-top: 18px;
    padding-bottom: 18px;
  }
}
  </style>
</head>
<body>
  <main>
    <header><span class="dot"></span><strong>lucas@portfolio</strong><span class="muted">/home/visitor</span></header>
    <section id="screen" aria-live="polite"></section>
    <form id="terminal">
      <label for="cmd">$</label>
      <input id="cmd" autocomplete="off" autofocus aria-label="Terminal command">
    </form>
  </main>
  <script>
    const screen = document.querySelector("#screen");
    const input = document.querySelector("#cmd");
    const form = document.querySelector("#terminal");
    const data = {
      help: "Available commands: help, about, skills, projects, contact, theme, clear",
      about: "Builder of useful web tools, automation scripts, and playful interfaces. This terminal is keyboard-first and stores no data.",
      skills: "Frontend: HTML, CSS, JavaScript, React. Backend: Python, Flask, APIs. Tools: Git, data visualization, local-first apps.",
      projects: ["app-lab-collection: ten small browser apps", "video-summarizer: extract notes from media", "web-checklists: structured checklist editor"].join("\\n"),
      contact: "Email: lucas.tarragomahiques@gmail.com\\nGitHub: https://github.com/lucas",
      theme: "Theme toggled. This command cycles between phosphor and amber."
    };
    let amber = false;
    const boot = [
      "RETRO PORTFOLIO OS v1.0",
      "Memory check: 640K OK",
      "Loading profile...",
      "Type 'help' and press Enter."
    ];
    function print(text, cls = "") {
      const p = document.createElement("p");
      p.className = `line ${cls}`;
      p.textContent = text;
      screen.appendChild(p);
      screen.scrollTop = screen.scrollHeight;
    }
    async function typeLine(text) {
      const p = document.createElement("p");
      p.className = "line";
      screen.appendChild(p);
      for (const ch of text) {
        p.textContent += ch;
        await new Promise(r => setTimeout(r, 16));
      }
      screen.scrollTop = screen.scrollHeight;
    }
    async function bootSequence() {
      for (const line of boot) await typeLine(line);
    }
    form.addEventListener("submit", event => {
      event.preventDefault();
      const raw = input.value.trim();
      if (!raw) return;
      print(`$ ${raw}`, "command");
      input.value = "";
      const cmd = raw.toLowerCase();
      if (cmd === "clear") screen.innerHTML = "";
      else if (cmd === "theme") {
        amber = !amber;
        document.documentElement.style.setProperty("--green", amber ? "#ffbf47" : "#47ff7a");
        document.documentElement.style.setProperty("--muted", amber ? "#b38c4a" : "#74a985");
        print(data.theme);
      } else print(data[cmd] || `Command not found: ${raw}. Try 'help'.`, data[cmd] ? "" : "muted");
    });
    bootSequence();
  </script>
</body>
</html>
